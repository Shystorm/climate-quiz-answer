name: Daily Quiz Update

on:
  schedule:
    # 매일 한국 시간 00:05 실행 (UTC 15:05)
    - cron: '5 15 * * *'
  workflow_dispatch: # 수동 실행 버튼 (테스트용)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script to Generate HTML
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "Auto-Bot"
          git config --global user.email "bot@noreply.github.com"
          git add index.html
          git commit -m "Update quiz for $(date +'%Y-%m-%d')" || exit 0
          git push
