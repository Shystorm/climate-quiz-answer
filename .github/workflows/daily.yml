name: Daily Quiz Update

on:
  schedule:
    - cron: '5 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script to Generate HTML
        env:
          MEM_INFO_ID: ${{ secrets.MEM_INFO_ID }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "Auto-Bot"
          git config --global user.email "bot@noreply.github.com"
          
          # index.html과 history 폴더 내의 모든 변화를 추가
          if [ -f "index.html" ]; then
            git add index.html history/
            git commit -m "Update quiz for $(date +'%Y-%m-%d')" || exit 0
            git push
          else
            echo "🚨 index.html 파일이 생성되지 않았습니다."
            exit 1
          fi
