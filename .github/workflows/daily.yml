name: Daily Quiz Update

on:
  schedule:
    - cron: '5 15 * * *' # 매일 한국 시간 오전 0시 5분
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 쓰기 권한 부여

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run main.py
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add index.html history/
          # 변경사항이 있을 때만 커밋 (에러 방지)
          git commit -m "Update Daily Quiz: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
